name: shadcn diff check

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run shadcn diff
        id: diff
        run: |
          output=$(npx shadcn@latest diff 2>&1) || true
          echo "diff_output<<DIFFEOF" >> "$GITHUB_OUTPUT"
          echo "$output" >> "$GITHUB_OUTPUT"
          echo "DIFFEOF" >> "$GITHUB_OUTPUT"
          if [ -n "$output" ] && ! echo "$output" | grep -q "No diff"; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue if upstream changed
        if: steps.diff.outputs.has_changes == 'true'
        uses: actions/github-script@v7  # TODO: pin to SHA digest before first release
        with:
          script: |
            const body = `## shadcn/ui upstream diff detected

            Weekly automated \`npx shadcn diff\` found upstream changes in copied components.

            \`\`\`
            ${{ steps.diff.outputs.diff_output }}
            \`\`\`

            **Action:** Review the diff above. Apply changes selectively using \`npx shadcn add <component> --overwrite\` for components that should be updated.

            Per ADR-002: detection is automated, application stays human-reviewed.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore: shadcn/ui upstream components have changed',
              body,
              labels: ['dependencies', 'maintenance']
            });
