<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clear Skies Dashboard</title>
    <script>
      // Set data-theme before first paint to prevent flash of wrong theme (ADR-023/055).
      // Must be a classic script (not type="module") so it runs synchronously during parse.
      (function() {
        var s = localStorage.getItem('clearskies.theme.user-override');
        if (s === 'light' || s === 'dark') {
          document.documentElement.setAttribute('data-theme', s);
          return;
        }
        // 'system' preference: use cached scene daytime from the last visit.
        // ThemeProvider writes this cache whenever scene.daytime updates.
        var cached = localStorage.getItem('clearskies.scene.daytime');
        if (cached === 'true' || cached === 'false') {
          document.documentElement.setAttribute('data-theme', cached === 'true' ? 'light' : 'dark');
          return;
        }
        // First-ever visit: no cache, fall back to OS preference.
        var d = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', d);
      })();
    </script>
    <style>
      /* Splash screen — rendered before React, removed after scene resolves. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f0f1f3;
        transition: opacity 0.5s ease-out;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash-logo {
        width: 280px;
        max-width: 60vw;
        height: auto;
        margin-bottom: 1.5rem;
      }
      #splash-text {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 0.95rem;
        color: #6b7280;
        margin-bottom: 1rem;
        letter-spacing: 0.02em;
      }
      #splash-spinner {
        width: 28px;
        height: 28px;
        border: 3px solid #d1d5db;
        border-top-color: #2568a3;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <img id="splash-logo" src="/clearskies-logo.svg" alt="" />
      <div id="splash-text">Loading…</div>
      <div id="splash-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
